<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TV Channels</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      padding: 20px;
      margin: 0;
    }
    h1 {
      text-align: center;
      margin: 10px 0 20px;
    }
    .video-player {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 16px;
      background-color: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #222;
    }
    video {
      width: 100%;
      height: auto;
      background-color: #000;
      display: block;
    }

    .status {
      max-width: 900px;
      margin: 0 auto 16px;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
    }
    .status small { color: #bbb; }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
      padding: 10px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .channel {
      text-align: center;
      padding: 10px;
      background: #0b0b0b;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
    }
    .channel img {
      width: 110px;
      height: 70px;
      object-fit: contain;
      background-color: #151515;
      cursor: pointer;
      border-radius: 10px;
      padding: 8px;
    }
    .channel img:hover {
      outline: 2px solid #2d2d2d;
    }
    .channel-name {
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
      color: #eaeaea;
      word-break: break-word;
    }
  </style>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>
  <h1>TV Channels</h1>

  <div class="video-player">
    <video id="tvPlayer" controls playsinline></video>
  </div>

  <div id="status" class="status">
    Loading channels…
    <br><small>If nothing loads, open DevTools → Console/Network to see errors.</small>
  </div>

  <div id="channels-container" class="grid-container">
    <!-- Channels will be dynamically generated here -->
  </div>

  <script>
    let hlsInstance = null;

    function setStatus(text) {
      const el = document.getElementById('status');
      el.innerHTML = text;
    }

    function destroyHls() {
      if (hlsInstance) {
        try { hlsInstance.destroy(); } catch (_) {}
        hlsInstance = null;
      }
    }

    function playChannel(streamUrl) {
      const video = document.getElementById('tvPlayer');
      if (!video) return;

      setStatus(`Playing: <small>${streamUrl}</small>`);

      // Clean up any previous playback
      destroyHls();
      video.pause();
      video.removeAttribute('src');
      video.load();

      // If the browser supports native HLS (Safari/iOS), use it
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
        video.play().catch(err => {
          console.error('Native HLS play error:', err);
          setStatus(`Failed to play (native HLS).<br><small>${err.message || err}</small>`);
        });
        return;
      }

      // Otherwise use hls.js (Chrome/Edge/Firefox)
      if (window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls({
          // A couple of sane defaults for live streams:
          lowLatencyMode: true,
          backBufferLength: 30
        });

        hlsInstance.on(Hls.Events.ERROR, function (event, data) {
          // Some errors are recoverable; log all to help debugging
          console.error('HLS.js error:', data);

          if (data && data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                setStatus('Stream network error. Retrying…');
                hlsInstance.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                setStatus('Stream media error. Attempting recovery…');
                hlsInstance.recoverMediaError();
                break;
              default:
                setStatus('Fatal stream error. Try another channel.');
                destroyHls();
                break;
            }
          }
        });

        hlsInstance.loadSource(streamUrl);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(err => {
            console.error('Autoplay blocked / play error:', err);
            setStatus(`Click play on the video player (autoplay may be blocked).<br><small>${err.message || err}</small>`);
          });
        });

        return;
      }

      // If neither native nor hls.js works:
      setStatus('Your browser cannot play HLS streams here. Try Safari or a different browser/device.');
    }

    async function loadChannels() {
      const url = 'https://i.mjh.nz/au/Sydney/tv.json';

      try {
        setStatus('Loading channels…');

        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

        const channelsObj = await res.json();
        const channels = Object.values(channelsObj || {})
          .filter(ch => ch && (ch.mjh_master || ch.url || ch.stream))
          .map(ch => ({
            name: ch.name || 'Unknown',
            logo: ch.logo || 'https://via.placeholder.com/110x70?text=No+Logo',
            // prefer mjh_master
            stream: ch.mjh_master || ch.url || ch.stream
          }));

        channels.sort((a, b) => a.name.localeCompare(b.name));

        const container = document.getElementById('channels-container');
        container.innerHTML = '';

        if (!channels.length) {
          setStatus('Loaded 0 channels.<br><small>The JSON returned, but no playable stream URLs were found.</small>');
          container.innerHTML = '<p>No channels found.</p>';
          return;
        }

        setStatus(`Loaded ${channels.length} channels. Click a logo to play.`);

        for (const ch of channels) {
          const channelDiv = document.createElement('div');
          channelDiv.className = 'channel';

          const img = document.createElement('img');
          img.src = ch.logo;
          img.alt = ch.name;
          img.loading = 'lazy';
          img.addEventListener('click', () => playChannel(ch.stream));

          const title = document.createElement('div');
          title.className = 'channel-name';
          title.textContent = ch.name;

          channelDiv.appendChild(img);
          channelDiv.appendChild(title);
          container.appendChild(channelDiv);
        }
      } catch (err) {
        console.error('Error loading channels:', err);
        setStatus(`Failed to load channels.<br><small>${err.message || err}</small>`);
        document.getElementById('channels-container').innerHTML =
          '<p>Failed to load channels.</p>';
      }
    }

    // Make sure we actually call it after the DOM exists
    document.addEventListener('DOMContentLoaded', loadChannels);
  </script>
</body>
</html>
